<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OCP Procurement Intelligence — Simulateur Pro</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Fonds - Gris doux (plus confortable que blanc pur) */
  --bg:#e7eaec;--bg2:#FFFFFF;--bg3:#EBF0F5;--bg4:#E1E8EF;--bg5:#D4DCE5;
  
  /* Vert OCP */
  --P:#272354;--P2:#dbe4d5;--P3:#EFF8E8;--P4:rgba(15, 191, 47, 0.1);
  
  /* Textes */
  --txt:#034f22;--txt2:#2b3951;--txt3:#122540;
  
  /* Couleurs d'état */
  --rd:#E53E3E;--yl:#DD6B20;--bl:#3182CE;--pu:#805AD5;--cy:#0BC5EA;
  
  /* Bordures */
  --bdr:1px solid #E2E8F0;--bdr2:1px solid #CBD5E0;--r:12px;--r2:8px;--r3:4px;
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --grd:linear-gradient(135deg,#7AC143,#6CB33F);
}
html{height:100%}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;
  min-height:100vh;
  overflow:auto;
}
#root{display:flex;flex:1;min-height:100vh;overflow:hidden}

/* ═══════════════ SIDEBAR ═══════════════ */
.sb{width:252px;min-width:252px;background:var(--bg2);border-right:var(--bdr);display:flex;flex-direction:column;min-height:100vh;max-height:100vh;overflow:hidden;position:sticky;top:0}
.sb-logo{padding:25px 16px 16px;background:linear-gradient(160deg,#069924 0%,#069924 100%);border-bottom:var(--bdr);flex-shrink:0}
.sb-logo-head{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:15px;}
.sb-logo{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:left;}
.sb-logo-icon{
  width:30px;
  height:auto;
  filter: brightness(0) invert(1);
}.sb-logo h1{font-size:.9rem;color:var(--txt);font-weight:800;letter-spacing:1.5px;line-height:1.2}
.sb-logo h1 span{color:var(--P)}
.sb-logo p{font-size:.58rem;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase;padding-left:46px;margin-top:-2px}
.sb-status{display:flex;align-items:center;gap:6px;padding:5px 0 0}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--P);animation:pulse2 2s infinite;box-shadow:0 0 6px var(--P)}
@keyframes pulse2{0%,100%{opacity:1;box-shadow:0 0 6px var(--P)}50%{opacity:.5;box-shadow:0 0 12px var(--P)}}
.sb-status-txt{font-size:.6rem;color:var(--P);font-weight:600;letter-spacing:.5px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto;min-height:0}
.ni{display:flex;align-items:center;gap:10px;padding:9px 14px 9px 18px;cursor:pointer;border-left:3px solid transparent;color:var(--txt2);font-size:.77rem;transition:all .18s;position:relative}
.ni:hover{background:rgba(0,200,83,.04);color:var(--txt);border-left-color:rgba(0,200,83,.3)}
.ni.act{background:linear-gradient(90deg,rgba(0,200,83,.1),transparent);border-left-color:var(--P);color:var(--P);font-weight:600}
.ni.act::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:4px;height:18px;background:var(--P);border-radius:2px 0 0 2px;opacity:.4}
.ni-ico{font-size:.85rem;width:18px;text-align:center;flex-shrink:0}

/* ═══════════════ SIDEBAR KPI PANEL ═══════════════ */
.sb-kpis{border-top:var(--bdr);padding:12px 14px;background:linear-gradient(160deg,#069924,#069924);flex-shrink:0}
.sb-kpis-title{font-size:.58rem;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sb-kpis-title::before{content:'';flex:1;height:1px;background:var(--bdr)}
.sb-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sb-kpi-tile{background:var(--bg3);border:var(--bdr);border-radius:var(--r2);padding:8px 10px;transition:all .2s}
.sb-kpi-tile:hover{border-color:rgba(0,200,83,.25);background:rgba(0,200,83,.04)}
.sb-kpi-lbl{font-size:.55rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sb-kpi-val{font-size:.85rem;font-weight:700;line-height:1.1}
.sb-kpi-sub{font-size:.55rem;color:var(--txt3);margin-top:2px}

/* ═══════════════ SIDEBAR FOOTER ═══════════════ */
.sb-foot{padding:8px 14px;border-top:var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-foot-txt{font-size:.58rem;color:var(--txt3)}
.sb-foot-badge{background:var(--P3);color:var(--P);padding:1px 6px;border-radius:10px;font-size:.55rem;font-weight:700}

/* ═══════════════ MAIN LAYOUT ═══════════════ */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}

/* ═══════════════ TOPBAR ═══════════════ */
.topbar{height:52px;min-height:52px;background:linear-gradient(90deg,#069924,#092912);border-bottom:var(--bdr);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;position:relative}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--P),transparent);opacity:.3}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-ico{width:34px;height:34px;background:var(--P4);border:1px solid rgba(0,200,83,.2);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:1rem}
.topbar-title{font-size:.85rem;font-weight:700;color:var(--txt);letter-spacing:.3px}
.topbar-sub{font-size:.6rem;color:var(--txt3);margin-top:1px}
.topbar-div{width:1px;height:22px;background:var(--bdr2);margin:0 4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.badge-grn{background:rgba(0,200,83,.1);color:var(--P);border:1px solid rgba(0,200,83,.2)}
.badge-bl{background:rgba(41,121,255,.1);color:var(--bl);border:1px solid rgba(41,121,255,.2)}
.badge-yl{background:rgba(255,165,2,.1);color:var(--yl);border:1px solid rgba(255,165,2,.2)}
.topbar-time{font-size:.6rem;color:var(--txt3);padding:3px 8px;background:var(--bg3);border:var(--bdr);border-radius:20px}

/* ═══════════════ CONTENT ═══════════════ */
.content{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:10px;min-height:0}

/* ═══════════════ KPI STRIP ═══════════════ */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex-shrink:0}
.kpi{background:var(--bg2);border:var(--bdr);border-radius:var(--r);padding:13px 15px;position:relative;overflow:hidden;transition:all .2s;cursor:default}
.kpi::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--kpi-c,var(--P));opacity:.7;transition:opacity .2s}
.kpi:hover{border-color:rgba(0,200,83,.2);box-shadow:0 6px 24px rgba(0,0,0,.4);transform:translateY(-1px)}
.kpi:hover::before{opacity:1}
.kpi-ico{font-size:1.4rem;position:absolute;right:12px;top:12px;opacity:.12}
.kpi-lbl{font-size:.58rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;font-weight:600}
.kpi-val{font-size:1.55rem;font-weight:800;line-height:1;letter-spacing:-1px}
.kpi-sub{font-size:.6rem;color:var(--txt3);margin-top:4px;display:flex;align-items:center;gap:3px}
.kpi-trend{display:inline-flex;align-items:center;gap:2px;font-size:.58rem;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:4px}
.kpi-trend.up{background:rgba(0,200,83,.12);color:var(--P)}
.kpi-trend.dn{background:rgba(255,71,87,.12);color:var(--rd)}

/* ═══════════════ GRID ═══════════════ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ═══════════════ CARD ═══════════════ */
.card{background:var(--bg2);border:var(--bdr);border-radius:var(--r);padding:14px;transition:all .2s}
.card:hover{box-shadow:0 6px 28px rgba(0,0,0,.45);border-color:#1e2e4a}
.ct{font-size:.6rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:700;display:flex;align-items:center;gap:6px}
.ct::after{content:'';flex:1;height:1px;background:var(--bdr)}
.kv{font-size:1.5rem;font-weight:700}
.kv.grn{color:var(--P)}.kv.yl{color:var(--yl)}.kv.rd{color:var(--rd)}.kv.bl{color:var(--bl)}
.ks{font-size:.65rem;color:var(--txt3);margin-top:3px}

/* ═══════════════ CHART BOX ═══════════════ */
.chart-box{position:relative;width:100%;height:190px;display:block}
.chart-box.md{height:220px}
.chart-box.lg{height:260px}

/* ═══════════════ TABLE ═══════════════ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.73rem}
th{background:var(--bg3);color:var(--txt3);text-align:left;padding:8px 10px;border-bottom:var(--bdr);font-weight:700;font-size:.58rem;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #0f1a2a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,200,83,.025)}
tbody tr{transition:background .12s}

/* ═══════════════ CTRL ═══════════════ */
.ctrl{background:var(--bg3);border:var(--bdr);border-radius:var(--r);padding:12px 14px}
.ctrl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.ctrl-grp{display:flex;flex-direction:column;gap:3px}
.ctrl-lbl{font-size:.58rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;font-weight:600}
select,input[type=range],input[type=number]{background:var(--bg2);border:var(--bdr);color:var(--txt);border-radius:var(--r2);padding:5px 9px;font-size:.73rem;outline:none;transition:border-color .15s}
select:hover,select:focus{border-color:rgba(0,200,83,.4)}
input[type=range]{padding:4px 0;accent-color:var(--P);width:130px;cursor:pointer}

/* ═══════════════ MISC ═══════════════ */
.pbar{height:4px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:4px}
.pb-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.62rem;font-weight:700}
.pill-A{background:rgba(0,200,83,.12);color:#39d96a;border:1px solid rgba(0,200,83,.2)}
.pill-B{background:rgba(0,200,83,.07);color:#7ee23a;border:1px solid rgba(0,200,83,.15)}
.pill-C{background:rgba(255,165,2,.1);color:#b57705;border:1px solid rgba(255,165,2,.2)}
.pill-D{background:rgba(255,71,87,.1);color:#ae212d;border:1px solid rgba(255,71,87,.2)}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0f1a2a}
.mrow:last-child{border-bottom:none}
.mk{color:var(--txt3);font-size:.73rem}.mv{font-size:.73rem;font-weight:600}
.mv.grn{color:var(--P)}.mv.bl{color:var(--bl)}.mv.yl{color:var(--yl)}.mv.rd{color:var(--rd)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #1e2a3d;border-top-color:var(--P);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.rpt-section{background:var(--bg2);border:var(--bdr);border-radius:var(--r);padding:15px}
.rpt-section h3{color:var(--P);font-size:.8rem;margin-bottom:10px;padding-bottom:8px;border-bottom:var(--bdr);font-weight:700;letter-spacing:.3px}
.rec-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #0f1a2a}
.rec-item:last-child{border-bottom:none}
.rec-num{background:linear-gradient(135deg,var(--P),#00bcd4);color:#000;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;flex-shrink:0;margin-top:1px}
.rec-text{font-size:.73rem;color:var(--txt2);line-height:1.6}
.rec-text strong{color:var(--txt)}

/* ═══════════════ SCROLLBAR ═══════════════ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e2a3d;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2a3a50}

/* ═══════════════ AI AGENT ═══════════════ */
.ai-fab{position:fixed;bottom:22px;right:22px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#00A651,#00c46a);border:none;cursor:pointer;box-shadow:0 4px 24px rgba(0,166,81,.5);display:flex;align-items:center;justify-content:center;font-size:1.3rem;z-index:2000;transition:transform .2s,box-shadow .2s}
.ai-fab:hover{transform:scale(1.1);box-shadow:0 6px 32px rgba(0,166,81,.7)}
.ai-notif{position:absolute;top:-2px;right:-2px;width:16px;height:16px;background:var(--rd);border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;color:#fff}
.ai-panel{position:fixed;bottom:86px;right:22px;width:375px;height:520px;background:var(--bg2);border:var(--bdr);border-radius:16px;box-shadow:0 12px 50px rgba(0,0,0,.7);display:flex;flex-direction:column;z-index:2000;overflow:hidden;animation:slideUp .22s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ai-head{padding:13px 15px;background:linear-gradient(135deg,#060e1a,#0b1828);border-bottom:var(--bdr);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ai-avi{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--P),#00bcd4);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;box-shadow:0 4px 12px rgba(0,200,83,.3)}
.ai-info h4{font-size:.82rem;font-weight:700;color:var(--txt)}
.ai-info p{font-size:.6rem;color:var(--P);display:flex;align-items:center;gap:3px;margin-top:1px}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--P);animation:pulse2 2s infinite}
.ai-x{margin-left:auto;background:none;border:1px solid var(--bdr);color:var(--txt3);cursor:pointer;font-size:.85rem;padding:4px 7px;border-radius:var(--r2);transition:all .15s}
.ai-x:hover{color:var(--txt);background:var(--bg4);border-color:#2a3a50}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.ai-msg{display:flex;gap:8px;align-items:flex-end}
.ai-msg.user{flex-direction:row-reverse}
.ai-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.ai-msg.ai .ai-av{background:var(--P4);color:var(--P)}
.ai-msg.user .ai-av{background:rgba(41,121,255,.1);color:var(--bl)}
.ai-bub{max-width:270px;padding:9px 12px;font-size:.73rem;line-height:1.55;border-radius:12px;word-break:break-word}
.ai-msg.ai .ai-bub{background:var(--bg3);color:var(--txt);border-bottom-left-radius:3px;border:var(--bdr)}
.ai-msg.user .ai-bub{background:rgba(41,121,255,.08);color:var(--bl);border-bottom-right-radius:3px;border:1px solid rgba(41,121,255,.15)}
.ai-bub strong{color:var(--P)}
.ai-typ{display:flex;gap:4px;padding:3px 0}
.ai-typ span{width:6px;height:6px;border-radius:50%;background:var(--txt3);animation:bnc .9s infinite}
.ai-typ span:nth-child(2){animation-delay:.2s}
.ai-typ span:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.ai-sugs{padding:8px 12px;border-top:var(--bdr);display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;background:var(--bg)}
.ai-sug{background:var(--bg3);border:var(--bdr);color:var(--txt3);padding:3px 9px;border-radius:12px;font-size:.62rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.ai-sug:hover{background:var(--P4);color:var(--P);border-color:rgba(0,200,83,.3)}
.ai-inp-row{padding:10px 12px;border-top:var(--bdr);display:flex;gap:8px;flex-shrink:0}
.ai-inp-row input{flex:1;background:var(--bg3);border:var(--bdr);color:var(--txt);border-radius:20px;padding:7px 14px;font-size:.73rem;outline:none;transition:border-color .15s}
.ai-inp-row input:focus{border-color:rgba(0,200,83,.4);box-shadow:0 0 0 3px rgba(0,200,83,.06)}
.ai-inp-row button{background:linear-gradient(135deg,var(--P),#00bcd4);color:#000;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 10px rgba(0,200,83,.3)}
.ai-inp-row button:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(0,200,83,.45)}
.ai-inp-row button:disabled{background:var(--bg4);cursor:not-allowed;box-shadow:none;transform:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

/* DATA */
const MAT=[
  {id:'M1',n:'Soufre (Ssol)',short:'Ssol',cj:247.93,p:105,v:0.18,cat:'Pétrole',col:'#58A6FF'},
  {id:'M2',n:'Ammoniac (NH3)',short:'NH3',cj:97.23,p:380,v:0.25,cat:'Engrais',col:'#3FB950'},
  {id:'M3',n:'Amine',short:'Amine',cj:0.54,p:2800,v:0.12,cat:'Chimique',col:'#D29922'},
  {id:'M4',n:'Fuel',short:'Fuel',cj:6.42,p:8.5,v:0.22,cat:'Pétrole',col:'#F85149'},
  {id:'M5',n:'K09',short:'K09',cj:9.14,p:360,v:0.15,cat:'Chimique',col:'#BC8CFF'},

  {id:'M7',n:'Granulation',short:'Gran.',cj:427.02,p:325,v:0.11,cat:'Autre',col:'#00A651'},
];
const FOUR=[
  {id:'F1',n:'ADNOC',pays:'UAE',fl:'AE',pb:105,del:33,fib:97.1,esg:8.58,rp:3,cap:1689600},
  {id:'F2',n:'Afriquia',pays:'Maroc',fl:'MA',pb:108,del:44,fib:94.7,esg:10,rp:5,cap:305424},
  {id:'F3',n:'Aramco',pays:'Arabie S.',fl:'SA',pb:102,del:29,fib:85.5,esg:7.81,rp:4,cap:1795236},
  {id:'F4',n:'BASF',pays:'Allemagne',fl:'DE',pb:112,del:25,fib:92.3,esg:9.13,rp:1,cap:122448},
  {id:'F5',n:'Yara',pays:'Norvège',fl:'NO',pb:110,del:28,fib:96.4,esg:10,rp:1,cap:482040},
  {id:'F6',n:'CF Industries',pays:'USA',fl:'US',pb:107,del:41,fib:93.7,esg:8.8,rp:2,cap:395196},
];
const PHASES=[
  {id:0,ico:'',lbl:'Dashboard'},{id:1,ico:'',lbl:'EOQ Wilson'},
  {id:2,ico:'',lbl:'Fournisseurs'},{id:3,ico:'',lbl:'Scénarios'},
  {id:4,ico:'',lbl:'Monte Carlo'},{id:5,ico:'',lbl:'Prévisions ML'},
  {id:6,ico:'',lbl:'Gestion Risques'},{id:7,ico:'',lbl:'Rapport'},
];

/* FORMULAS */
const eoq=(D,S,H)=>Math.sqrt(2*D*S/H);
const ss=(z,sig,lt)=>z*sig*Math.sqrt(lt);
const rop=(D,lt,s)=>D*lt+s;
const tc=(D,Q,S,H)=>(D/Q)*S+(Q/2)*H;
const Z_MAP={90:1.28,95:1.645,99:1.96,99.9:2.326};
function scoreF(f,w){
  const ww=w||{px:.30,dl:.25,fb:.30,es:.10,rp:.05};
  return Math.min(100,
    Math.max(0,100-((f.pb-100)/20*100))*ww.px+
    Math.max(0,100-((f.del-20)/30*100))*ww.dl+
    f.fib*ww.fb+f.esg*10*ww.es+
    Math.max(0,100-(f.rp-1)*20)*ww.rp);
}
function clsF(s){return s>=85?'A':s>=70?'B':s>=55?'C':'D'}
function riskF(g,o,f,d,p){return g*.25+o*.30+f*.20+d*.15+p*.10}
function clsR(r){return r<30?'Faible':r<60?'Modéré':'Élevé'}
function bm(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}

/* CHART HOOK — uses setTimeout to wait for layout */
function useChart(ref,mkCfg,deps){
  const inst=useRef(null);
  useEffect(()=>{
    const t=setTimeout(()=>{
      if(!ref.current)return;
      if(inst.current){inst.current.destroy();inst.current=null;}
      try{inst.current=new Chart(ref.current,mkCfg());}catch(e){console.warn(e);}
    },80);
    return()=>{clearTimeout(t);if(inst.current){inst.current.destroy();inst.current=null;}};
  },deps);
}

const PROXY='https://api.allorigins.win/raw?url=';

async function searchGoogle(q,key,cx){
  const url=`https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(q)}&key=${key}&cx=${cx}&num=5&hl=fr`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('Google API error '+r.status);
  const d=await r.json();
  return(d.items||[]).map(i=>({title:i.title,snippet:i.snippet,link:i.link,source:'google'}));
}

async function searchDDG(q){
  const url=PROXY+encodeURIComponent(`https://api.duckduckgo.com/?q=${encodeURIComponent(q)}&format=json&no_html=1&skip_disambig=1`);
  const r=await fetch(url);
  const d=await r.json();
  const results=[];
  if(d.AbstractText)results.push({title:d.Heading||q,snippet:d.AbstractText,link:d.AbstractURL||'',source:'ddg'});
  (d.RelatedTopics||[]).slice(0,4).forEach(t=>{if(t.Text)results.push({title:t.Text.slice(0,60),snippet:t.Text,link:t.FirstURL||'',source:'ddg'});});
  return results;
}

async function searchWiki(q){
  const url=PROXY+encodeURIComponent(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`);
  const r=await fetch(url);
  const d=await r.json();
  if(d.type==='disambiguation'||!d.extract)return null;
  return{title:d.title,snippet:d.extract,link:d.content_urls?.desktop?.page||'',source:'wiki',thumb:d.thumbnail?.source};
}

async function searchNews(q,key,cx){
  const url=`https://www.googleapis.com/customsearch/v1?q=${encodeURIComponent(q+' actualités 2025')}&key=${key}&cx=${cx}&num=5&dateRestrict=m3&hl=fr`;
  const r=await fetch(url);
  const d=await r.json();
  return(d.items||[]).map(i=>({title:i.title,snippet:i.snippet,link:i.link,source:'news'}));
}

function isWebQuery(q){
  const webKW=['prix actuel','cours','marché','news','actualité','actu','recherche','cherche','trouve',
    'qu\'est','c\'est quoi','définition','explique moi','comment','pourquoi','quand','où est',

    'fournisseur mondial','prix mondial','phosphate','sulfate','ammoniaque prix',
    'latest','recent','today','2024','2025','update'];

}

function isOCPQuery(q){
  const ocpKW=['eoq','wilson','ss ','stock sécur','rop','reappro','coût total','fournisseur',
    'adnoc','afriquia','aramco','basf','yara','cf ind','score','classe','risque fourn',
    'matière','ssol','nh3','amine','fuel','k09','phosphorique','granulation','scénari',

function formatSearchResults(results,src){
  if(!results||results.length===0)return`Aucun résultat trouvé pour cette recherche.`;
  const ico=src==='google'?'':src==='wiki'?'':'';
  let txt=`${ico} **Résultats ${src==='google'?'Google':src==='wiki'?'Wikipedia':'DuckDuckGo'}:**\n\n`;
  results.slice(0,4).forEach((r,i)=>{
    txt+=`**${i+1}. ${r.title}**\n${r.snippet?r.snippet.slice(0,200)+'...':''}\n${r.link?`🔗 ${r.link.slice(0,60)}...`:''}\n\n`;
  });
  return txt.trim();
}

async function callGemini(prompt,key){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
  const r=await fetch(url,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{maxOutputTokens:600,temperature:0.7,topP:0.9}
    })
  });
  if(!r.ok)throw new Error('Gemini '+r.status);
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

${context}

Instrutions: Réponds en français, de façon concise et professionnelle (max 6 lignes). Intègre les résultats web avec ton expertise OCP si pertinent. Utilise **gras** pour les points importants.`;

    setTimeout(()=>setKeySaved(false),2500);
  }

  async function send(txt){

    if(!q)return;
    setInp('');
    setMsgs(p=>[...p,{role:'user',text:q}]);
    setTyping(true);

    const ql=q.toLowerCase();
    const needsWeb=searchMode==='web'||(searchMode==='auto'&&isWebQuery(ql)&&!isOCPQuery(ql));
    const needsLocal=searchMode==='local'||(searchMode==='auto'&&isOCPQuery(ql));
    const useGemini=!!gGemKey;

    try{
      let webCtx='';
      let webSrc='';

      /* ── COLLECT WEB CONTEXT ── */
      if(needsWeb||(!needsLocal&&!isOCPQuery(ql))){
        // 1. Google Search
        if(gKey&&gCX){
          setTypingLabel(useGemini?'🔍 Google → ✨ Gemini...':'Recherche Google en cours...');

            const isNewsQ=ql.includes('news')||ql.includes('actua')||ql.includes('récent');

              if(useGemini){
                webCtx=results.map(r=>`- ${r.title}: ${r.snippet||''}`).join('\n');

                setMsgs(p=>[...p,{role:'ai',text:formatSearchResults(results,'google'),src:'google'}]);

              } else {
                setMsgs(p=>[...p,{role:'ai',text:` **Wikipedia — ${wiki.title}**\n\n${wiki.extract}\n\n🔗 ${wiki.link}`,src:'wiki'}]);
                setTyping(false);setTypingLabel('En train de répondre...');return;

          setTypingLabel(useGemini?' DuckDuckGo →  Gemini...':'Recherche DuckDuckGo...');

function EOQPage(){

  const [S,setS]=useState(500);
  const [z,setZ]=useState(95);
  const [lt,setLt]=useState(7);
  const [sig,setSig]=useState(15);
  const cRef=useRef(null),sRef=useRef(null);
  const m=MAT.find(x=>x.id===mid);
  const D=m.cj*365,H=m.p*m.v,zv=Z_MAP[z]||1.645;
  const Q=eoq(D,S,H),SS=ss(zv,sig,lt),ROP=rop(m.cj,lt,SS),TC=tc(D,Q,S,H);

  useChart(cRef,()=>{
    const qs=Array.from({length:60},(_,i)=>(Q*.1+i*(Q*3.5/60)).toFixed(0));
    const ho=qs.map(q=>(+q/2)*H),or=qs.map(q=>(D/+q)*S),tot=qs.map((_,i)=>ho[i]+or[i]);
    return{type:'line',data:{labels:qs,datasets:[
      {label:'Total',data:tot,borderColor:'#00A651',backgroundColor:'rgba(0,166,81,.08)',fill:true,tension:.3,borderWidth:2,pointRadius:0},
      {label:'Holding',data:ho,borderColor:'#58a6ff',borderWidth:1.5,tension:.3,pointRadius:0},

const SCEN=[

    data:{labels:['Coût(inv)','Délai(inv)','Fiab.','ESG','Risque(inv)'],

        data:[100-(r.px-.85)*500,100-(r.del-.6)*150,r.rb*100,r.esg*90,100-r.risk],

      scales:{r:{ticks:{color:'#4a5f7a',backdropColor:'transparent',font:{size:8}},grid:{color:'#30363d'},pointLabels:{color:'#4a5f7a',font:{size:9}}}},

  return(
    <>
      <div className="ctrl">
        <div className="ctrl-row">
          <div className="ctrl-grp"><div className="ctrl-lbl">Matière</div>
            <select value={mid} onChange={e=>setMid(e.target.value)}>{MAT.map(m=><option key={m.id} value={m.id}>{m.n}</option>)}</select></div>
          <div className="ctrl-grp"><div className="ctrl-lbl">S base = {baseS} MAD</div>
            <input type="range" min="100" max="2000" step="50" value={baseS} onChange={e=>setBaseS(+e.target.value)}/></div>
        </div>
      </div>
      <div className="kpi-strip">
        <div className="kpi"><div className="kpi-lbl">🏆 Meilleur Scénario</div><div className="kpi-val" style={{fontSize:'1rem',color:'var(--P)'}}>{best.n}</div><div className="kpi-sub">{best.desc}</div></div>
        <div className="kpi"><div className="kpi-lbl">💰 Économie vs Contrat</div><div className="kpi-val" style={{color:'var(--yl)'}}>{(base-best.total).toFixed(2)} <span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}>M MAD</span></div><div className="kpi-sub">{((base-best.total)/base*100).toFixed(1)}% d'économie</div></div>
        <div className="kpi"><div className="kpi-lbl">⚠️ Risque Minimum</div>{(()=>{const r=results.reduce((a,b)=>b.risk<a.risk?b:a);return<><div className="kpi-val" style={{fontSize:'1rem',color:'var(--P)'}}>{r.n}</div><div className="kpi-sub">Score: {r.risk}</div></>;})()}</div>
        <div className="kpi"><div className="kpi-lbl">📦 Q* Best Scénario</div><div className="kpi-val" style={{color:'var(--bl)'}}>{best.Q.toLocaleString('fr-FR')} <span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}>T</span></div></div>

        <div className="card"><div className="ct">🕸️ Multi-Critères (Top 4)</div><div className="chart-box md"><canvas ref={cRef}/></div></div>
      </div>
      <div className="card">
        <div className="ct">📋 Détail 6 Scénarios</div>
        <div className="tbl-wrap">

/* ════════ MONTE CARLO ════════ */
function MCPage(){
  const [mid,setMid]=useState('M2');
  const [n,setN]=useState(1000);
  const [cv,setCv]=useState(0.15);
  const [running,setRunning]=useState(false);
  const [res,setRes]=useState(null);
  const hRef=useRef(null),cRef=useRef(null);
  const hInst=useRef(null),cInst=useRef(null);
  const m=MAT.find(x=>x.id===mid);

  function runSim(){
    setRunning(true);
    setTimeout(()=>{
      const D=m.cj*365,sig=D*cv;
      const sims=Array.from({length:n},()=>D+bm()*sig).sort((a,b)=>a-b);
      const mean=sims.reduce((a,b)=>a+b,0)/n;
      const std=Math.sqrt(sims.reduce((a,b)=>a+(b-mean)**2,0)/n);
      const p95=sims[Math.floor(n*.95)],tail=sims.slice(Math.floor(n*.95));
      const cvar=tail.reduce((a,b)=>a+b,0)/tail.length;
      const H=m.p*m.v,Qb=eoq(D,500,H),Qp=eoq(p95,500,H);
      setRes({sims,mean,std,p95,cvar,Qb,Qp,TCb:tc(D,Qb,500,H),TCp:tc(p95,Qp,500,H)});
      setRunning(false);
    },60);
  }

  useEffect(()=>{
    if(!res)return;
    setTimeout(()=>{
      if(hInst.current){hInst.current.destroy();}
      if(cInst.current){cInst.current.destroy();}
      if(hRef.current){
        const mn=res.sims[0],mx=res.sims[res.sims.length-1],bins=40,bw=(mx-mn)/bins;
        const counts=Array(bins).fill(0),labels=Array.from({length:bins},(_,i)=>(mn+i*bw).toFixed(0));
        res.sims.forEach(v=>{counts[Math.min(bins-1,Math.floor((v-mn)/bw))]++;});
        hInst.current=new Chart(hRef.current,{type:'bar',
          data:{labels,datasets:[{data:counts,backgroundColor:labels.map((_,i)=>{const v=mn+i*bw;return v>=res.p95?'#f85149aa':v>=res.mean?'#d2992244':'#58a6ff44';}),borderWidth:0,borderRadius:2}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
            scales:{x:{ticks:{color:'#4a5f7a',maxTicksLimit:6,font:{size:8}}},y:{ticks:{color:'#4a5f7a',font:{size:8}},grid:{color:'#0f1a2a'}}}}});
      }
      if(cRef.current){
        const step=Math.max(1,Math.floor(res.sims.length/80));
        const xs=[],ys=[];
        for(let i=0;i<res.sims.length;i+=step){xs.push(res.sims[i].toFixed(0));ys.push(((i+1)/res.sims.length*100).toFixed(1));}
        cInst.current=new Chart(cRef.current,{type:'line',
          data:{labels:xs,datasets:[{data:ys,borderColor:'#00A651',backgroundColor:'rgba(0,166,81,.08)',fill:true,tension:.3,borderWidth:2,pointRadius:0}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
            scales:{x:{ticks:{color:'#4a5f7a',maxTicksLimit:6,font:{size:8}}},y:{ticks:{color:'#4a5f7a',font:{size:8}},grid:{color:'#0f1a2a'},min:0,max:100}}}});
      }
    },80);
  },[res]);

  return(
    <>
      <div className="ctrl">
        <div className="ctrl-row">
          <div className="ctrl-grp"><div className="ctrl-lbl">Matière</div>
            <select value={mid} onChange={e=>setMid(e.target.value)}>{MAT.map(m=><option key={m.id} value={m.id}>{m.n}</option>)}</select></div>
          <div className="ctrl-grp"><div className="ctrl-lbl">N simulations</div>
            <select value={n} onChange={e=>setN(+e.target.value)}>
              <option value={500}>500</option><option value={1000}>1 000</option>
              <option value={5000}>5 000</option><option value={10000}>10 000</option></select></div>
          <div className="ctrl-grp"><div className="ctrl-lbl">CV = {(cv*100).toFixed(0)}%</div>
            <input type="range" min="0.05" max="0.50" step="0.01" value={cv} onChange={e=>setCv(+e.target.value)}/></div>
          <div className="ctrl-grp"><div className="ctrl-lbl">&nbsp;</div>
            <button onClick={runSim} disabled={running}
              style={{background:'var(--P)',color:'#000',border:'none',padding:'5px 14px',borderRadius:'var(--r2)',cursor:'pointer',fontWeight:700,fontSize:'.75rem'}}>
              {running?<><span className="spin" style={{borderTopColor:'#000'}}/> ...</>:'▶️ Lancer'}</button></div>
        </div>
      </div>
      {!res?(
        <div style={{textAlign:'center',padding:'40px 0',color:'var(--txt2)'}}>
          <div style={{fontSize:'2.5rem',marginBottom:8}}>🎲</div>
          <div style={{fontWeight:600,marginBottom:4}}>Monte Carlo — Méthode Box-Muller</div>
          <div style={{fontSize:'.75rem'}}>Configurez et cliquez sur Lancer</div>
        </div>
      ):(
        <>
          <div className="kpi-strip">
            <div className="kpi"><div className="kpi-lbl">📊 Demande μ</div><div className="kpi-val grn">{(res.mean/1e3).toFixed(1)}<span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}> kT</span></div><div className="kpi-sub">CV: {(res.std/res.mean*100).toFixed(1)}%</div></div>
            <div className="kpi"><div className="kpi-lbl">📏 Écart-type σ</div><div className="kpi-val bl">{(res.std/1e3).toFixed(2)}<span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}> kT</span></div></div>
            <div className="kpi"><div className="kpi-lbl">⚠️ VaR P95</div><div className="kpi-val yl">{(res.p95/1e3).toFixed(1)}<span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}> kT</span></div></div>
            <div className="kpi"><div className="kpi-lbl">🔥 CVaR</div><div className="kpi-val rd">{(res.cvar/1e3).toFixed(1)}<span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}> kT</span></div></div>
          </div>
          <div className="g2">
            <div className="card"><div className="ct">📊 Distribution ({n.toLocaleString()} sims)</div><div className="chart-box md"><canvas ref={hRef}/></div></div>
            <div className="card"><div className="ct">📈 CDF Cumulative</div><div className="chart-box md"><canvas ref={cRef}/></div></div>
          </div>
          <div className="g2">
            <div className="card"><div className="ct">📦 Impact Q*</div>
              <div className="mrow"><span className="mk">Q* demande μ</span><span className="mv grn">{res.Qb.toFixed(0)} T</span></div>
              <div className="mrow"><span className="mk">Q* demande P95</span><span className="mv yl">{res.Qp.toFixed(0)} T</span></div>
              <div className="mrow"><span className="mk">Différence</span><span className="mv rd">+{(res.Qp-res.Qb).toFixed(0)} T</span></div>
            </div>
            <div className="card"><div className="ct">💰 Impact Coûts</div>
              <div className="mrow"><span className="mk">TC demande μ</span><span className="mv grn">{(res.TCb/1e3).toFixed(1)} k MAD</span></div>
              <div className="mrow"><span className="mk">TC demande P95</span><span className="mv yl">{(res.TCp/1e3).toFixed(1)} k MAD</span></div>
              <div className="mrow"><span className="mk">Surcoût</span><span className="mv rd">+{((res.TCp-res.TCb)/1e3).toFixed(1)} k MAD</span></div>
            </div>
          </div>
        </>
      )}
    </>
  );
}

/* ════════ ML PAGE ════════ */
function MLPage(){
  const [mid,setMid]=useState('M1');
  const [hor,setHor]=useState(12);
  const [trend,setTrend]=useState(0.02);
  const lRef=useRef(null),iRef=useRef(null);
  const m=MAT.find(x=>x.id===mid),D=m.cj*365;
  const hist=useMemo(()=>Array.from({length:24},(_,i)=>+(D/12*(1+.15*Math.sin(2*Math.PI*i/12)+trend*i/12+bm()*.05)).toFixed(0)),[mid,trend]);
  const fc=useMemo(()=>{const last=hist[hist.length-1];return Array.from({length:hor},(_,i)=>+(last*(1+.15*Math.sin(2*Math.PI*(i+24)/12)*.5+trend*(24+i)/12/12+bm()*.03)).toFixed(0));},[hist,hor,trend]);

  useChart(lRef,()=>{
    const now=new Date();
    const hL=Array.from({length:24},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-24+i,1);return d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'});});
    const fL=Array.from({length:hor},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()+i,1);return d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'});});
    return{type:'line',data:{labels:[...hL,...fL],datasets:[
      {label:'Historique',data:[...hist,...Array(hor).fill(null)],borderColor:'#58a6ff',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:.3},
      {label:'Prévision SARIMA+XGB',data:[...Array(24).fill(null),...fc],borderColor:'#00A651',backgroundColor:'rgba(0,166,81,.07)',fill:false,borderWidth:2,pointRadius:3,tension:.3},
      {label:'IC+',data:[...Array(24).fill(null),...fc.map(v=>v*1.12)],borderColor:'rgba(0,166,81,.25)',backgroundColor:'rgba(0,166,81,.07)',fill:'+1',pointRadius:0,tension:.3},
      {label:'IC-',data:[...Array(24).fill(null),...fc.map(v=>v*.88)],borderColor:'rgba(0,166,81,.25)',backgroundColor:'transparent',fill:false,pointRadius:0,tension:.3},
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#4a5f7a',font:{size:9},filter:l=>!l.text.includes('-')}}},
      scales:{x:{ticks:{color:'#4a5f7a',maxTicksLimit:9,font:{size:9}}},y:{ticks:{color:'#4a5f7a',font:{size:9}},grid:{color:'#0f1a2a'}}}}};
  },[mid,hor,trend,hist,fc]);

  useChart(iRef,()=>({type:'bar',
    data:{labels:['Lag-1','Lag-12','Lag-3','Trend','Seasonality','Price','Inventory','Weather'],
      datasets:[{data:[28.4,22.1,15.3,12.8,9.6,6.2,3.4,2.2],
        backgroundColor:['#00A651cc','#58a6ffcc','#d29922cc','#bc8cffcc','#ffa657cc','#3fb950cc','#f85149cc','#58a6ff55'],
        borderWidth:0,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#4a5f7a',font:{size:9}},grid:{color:'#0f1a2a'}},y:{ticks:{color:'#4a5f7a',font:{size:9}}}}}
  }),[]);

  return(
    <>
      <div className="ctrl">
        <div className="ctrl-row">
          <div className="ctrl-grp"><div className="ctrl-lbl">Matière</div>
            <select value={mid} onChange={e=>setMid(e.target.value)}>{MAT.map(m=><option key={m.id} value={m.id}>{m.n}</option>)}</select></div>
          <div className="ctrl-grp"><div className="ctrl-lbl">Horizon = {hor} mois</div>
            <input type="range" min="3" max="24" value={hor} onChange={e=>setHor(+e.target.value)}/></div>
          <div className="ctrl-grp"><div className="ctrl-lbl">Tendance = {(trend*100).toFixed(0)}%/an</div>
            <input type="range" min="-0.10" max="0.15" step="0.01" value={trend} onChange={e=>setTrend(+e.target.value)}/></div>
        </div>
      </div>
      <div className="kpi-strip">
        <div className="kpi"><div className="kpi-lbl">🎯 MAPE</div><div className="kpi-val grn">4.2<span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}>%</span></div><div className="kpi-sub">Test set</div></div>
        <div className="kpi"><div className="kpi-lbl">📐 R²</div><div className="kpi-val bl">0.92</div><div className="kpi-sub">Coeff. détermination</div></div>
        <div className="kpi"><div className="kpi-lbl">🔮 Prévision {hor}m</div><div className="kpi-val yl">{(fc.reduce((a,b)=>a+b,0)/1e3).toFixed(1)}<span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}> kT</span></div></div>
        <div className="kpi"><div className="kpi-lbl">🤖 Modèle</div><div style={{fontSize:'.72rem',color:'var(--P)',fontWeight:600,marginTop:4}}>SARIMA(1,1,1)(1,1,1)₁₂</div><div style={{fontSize:'.72rem',color:'var(--bl)',fontWeight:600}}>+ XGBoost (60/40)</div></div>
      </div>
      <div className="card"><div className="ct">📈 Prévision — {m.short} (24h + {hor}m)</div><div className="chart-box lg"><canvas ref={lRef}/></div></div>
      <div className="g2">
        <div className="card"><div className="ct">🔬 Importance Variables</div><div className="chart-box md"><canvas ref={iRef}/></div></div>
        <div className="card"><div className="ct">📊 Métriques Modèle</div>
          <div className="mrow"><span className="mk">MAPE train</span><span className="mv grn">3.8%</span></div>
          <div className="mrow"><span className="mk">MAPE test</span><span className="mv grn">4.2%</span></div>
          <div className="mrow"><span className="mk">R²</span><span className="mv bl">0.92</span></div>
          <div className="mrow"><span className="mk">RMSE</span><span className="mv bl">{(D*.043/12).toFixed(0)} T/mois</span></div>
          <div className="mrow"><span className="mk">Validation</span><span className="mv grn">5-fold TimeSeriesCV</span></div>
          <div className="mrow"><span className="mk">Saisonnalité</span><span className="mv">Annuelle (12m)</span></div>
        </div>
      </div>
    </>
  );
}

/* ════════ RISK PAGE ════════ */
function RiskPage(){
  const [risks,setRisks]=useState(FOUR.map(f=>({...f,geo:f.rp*15+10,ops:Math.max(5,100-f.fib),fin:f.rp*8+12,del:+((f.del-20)/30*100).toFixed(0),px:+((Math.abs(f.pb-107))/10*20).toFixed(0)})));
  const bRef=useRef(null),rRef=useRef(null);
  const scored=useMemo(()=>risks.map(r=>({...r,total:+riskF(r.geo,r.ops,r.fin,r.del,r.px).toFixed(1)})),[risks]);

  useChart(bRef,()=>({type:'bar',
    data:{labels:scored.map(f=>f.n),datasets:[
      {label:'Géo(25%)',data:scored.map(r=>r.geo),backgroundColor:'#f8514944',borderColor:'#f85149',borderWidth:1},
      {label:'Ops(30%)',data:scored.map(r=>r.ops),backgroundColor:'#d2992244',borderColor:'#d29922',borderWidth:1},
      {label:'Fin(20%)',data:scored.map(r=>r.fin),backgroundColor:'#bc8cff44',borderColor:'#bc8cff',borderWidth:1},
      {label:'Délai(15%)',data:scored.map(r=>r.del),backgroundColor:'#58a6ff44',borderColor:'#58a6ff',borderWidth:1},
      {label:'Prix(10%)',data:scored.map(r=>r.px),backgroundColor:'#ffa65744',borderColor:'#ffa657',borderWidth:1},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#4a5f7a',font:{size:9}}}},
      scales:{x:{stacked:true,ticks:{color:'#4a5f7a',font:{size:9}}},y:{stacked:true,ticks:{color:'#4a5f7a',font:{size:9}},grid:{color:'#0f1a2a'},max:100}}}
  }),[JSON.stringify(risks)]);

  useChart(rRef,()=>({type:'radar',
    data:{labels:['Géo','Opérationnel','Financier','Délai','Prix'],
      datasets:scored.map((f,i)=>({label:f.n,data:[f.geo,f.ops,f.fin,f.del,f.px],
        borderColor:['#f85149','#d29922','#bc8cff','#58a6ff','#ffa657','#3fb950'][i],
        backgroundColor:'transparent',borderWidth:1.5,pointRadius:3}))},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:100,ticks:{color:'#4a5f7a',backdropColor:'transparent',font:{size:8}},grid:{color:'#30363d'},pointLabels:{color:'#4a5f7a',font:{size:9}}}},
      plugins:{legend:{labels:{color:'#4a5f7a',font:{size:9}}}}}
  }),[JSON.stringify(risks)]);

  return(
    <>
      <div className="ctrl">
        <div style={{marginBottom:7,color:'var(--txt2)',fontSize:'.72rem'}}>Ajustez les scores (0=faible · 100=élevé)</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(230px,1fr))',gap:9}}>
          {risks.map(r=>(
            <div key={r.id} style={{background:'var(--bg2)',border:'var(--bdr)',borderRadius:'var(--r2)',padding:10}}>
              <div style={{fontWeight:600,marginBottom:6,fontSize:'.75rem'}}>[{r.fl}] {r.n}</div>
              {[{k:'geo',l:'Géo-politique'},{k:'ops',l:'Opérationnel'},{k:'fin',l:'Financier'},{k:'del',l:'Délai'},{k:'px',l:'Prix'}].map(({k,l})=>(
                <div key={k} style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}>
                  <span style={{fontSize:'.62rem',color:'var(--txt2)',width:72,flexShrink:0}}>{l}</span>
                  <input type="range" min="0" max="100" value={r[k]} onChange={e=>setRisks(p=>p.map(x=>x.id===r.id?{...x,[k]:+e.target.value}:x))} style={{flex:1,width:'auto'}}/>
                  <span style={{fontSize:'.65rem',fontWeight:700,minWidth:20,color:r[k]>60?'var(--rd)':r[k]>30?'var(--yl)':'var(--P)'}}>{r[k]}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
      <div className="kpi-strip">
        {scored.sort((a,b)=>a.total-b.total).slice(0,4).map(r=>{const cls=clsR(r.total);return(
          <div key={r.id} className="kpi">
            <div className="kpi-lbl" style={{display:'flex',justifyContent:'space-between'}}>
              <span>[{r.fl}] {r.n}</span>
              <span className={'pill '+(cls==='Faible'?'pill-A':cls==='Modéré'?'pill-C':'pill-D')}>{cls}</span>
            </div>
            <div className="kpi-val" style={{color:r.total<30?'var(--P)':r.total<60?'var(--yl)':'var(--rd)'}}>{r.total}<span style={{fontSize:'1rem',color:'var(--txt2)',fontWeight:400}}>/100</span></div>
            <div className="pbar"><div className="pb-fill" style={{width:r.total+'%',background:r.total<30?'var(--P)':r.total<60?'var(--yl)':'var(--rd)'}}/></div>
          </div>
        );})}
      </div>
      <div className="g2">
        <div className="card"><div className="ct">📊 Décomposition du Risque</div><div className="chart-box md"><canvas ref={bRef}/></div></div>
        <div className="card"><div className="ct">🕸️ Radar des Risques</div><div className="chart-box md"><canvas ref={rRef}/></div></div>
      </div>
    </>
  );
}

/* ════════ RAPPORT ════════ */
function RptPage(){
  const totCost=MAT.reduce((a,m)=>{const D=m.cj*365,S=500,H=m.p*m.v;return a+tc(D,eoq(D,S,H),S,H);},0);
  const scores=FOUR.map(f=>({...f,s:+scoreF(f).toFixed(1)})).sort((a,b)=>b.s-a.s);
  return(
    <>
      <div className="rpt-section">
        <h3>📊 Synthèse Exécutive — Optimisation Achats OCP 2025</h3>
        <div className="g3">
          <div><div style={{color:'var(--txt2)',fontSize:'.7rem',marginBottom:3}}>Coût total optimisé EOQ</div><div style={{fontSize:'1.4rem',fontWeight:700,color:'var(--P)'}}>{(totCost/1e6).toFixed(2)} M MAD</div></div>
          <div><div style={{color:'var(--txt2)',fontSize:'.7rem',marginBottom:3}}>Meilleur fournisseur</div><div style={{fontSize:'.95rem',fontWeight:700}}>[{scores[0].fl}] {scores[0].n}</div><div style={{fontSize:'.7rem',color:'var(--txt2)'}}>Score {scores[0].s}/100 — Classe {clsF(scores[0].s)}</div></div>
          <div><div style={{color:'var(--txt2)',fontSize:'.7rem',marginBottom:3}}>Stratégie recommandée</div><div style={{fontSize:'.95rem',fontWeight:700,color:'var(--yl)'}}>Contrat long terme 3 ans</div><div style={{fontSize:'.7rem',color:'var(--txt2)'}}>Économie –8% prix</div></div>
        </div>
      </div>
      <div className="rpt-section">
        <h3>📦 Résultats EOQ Wilson par Matière</h3>
        <table>
          <thead><tr><th>Matière</th><th>D T/an</th><th>Q* T</th><th>SS T</th><th>ROP T</th><th>TC k MAD</th><th>Cmdes/an</th></tr></thead>
          <tbody>{MAT.map(m=>{const D=m.cj*365,S=500,H=m.p*m.v,Q=eoq(D,S,H),SS=ss(1.645,m.cj*.15,7),ROP=rop(m.cj,7,SS),TC=tc(D,Q,S,H);return(
            <tr key={m.id}><td><span style={{color:m.col,fontWeight:700}}>●</span> {m.n}</td><td>{D.toFixed(0)}</td><td style={{fontWeight:700,color:'var(--P)'}}>{Q.toFixed(0)}</td><td>{SS.toFixed(0)}</td><td>{ROP.toFixed(0)}</td><td style={{fontWeight:600}}>{(TC/1e3).toFixed(1)}</td><td>{(D/Q).toFixed(1)}</td></tr>
          );})}</tbody>
        </table>
      </div>
      <div className="rpt-section">
        <h3>🏭 Classement Fournisseurs</h3>
        <table>
          <thead><tr><th>#</th><th>Fournisseur</th><th>Score</th><th>Cl.</th><th>$/T</th><th>Délai j</th><th>Fiab.%</th><th>ESG</th><th>Risque</th><th>Statut</th></tr></thead>
          <tbody>{scores.map((f,i)=>{const cls=clsF(f.s);return(
            <tr key={f.id} style={i<2?{background:'rgba(0,166,81,.04)'}:{}}>
              <td style={{fontWeight:700}}>{i+1}</td><td style={{fontWeight:600}}>[{f.fl}] {f.n}</td>
              <td style={{fontWeight:700,color:i===0?'var(--P)':'var(--txt)'}}>{f.s}</td>
              <td><span className={'pill pill-'+cls}>{cls}</span></td>
              <td>{f.pb}</td><td>{f.del}</td><td>{f.fib}</td><td>{f.esg}/10</td>
              <td style={{color:f.rp<=2?'var(--P)':f.rp<=3?'var(--yl)':'var(--rd)'}}>{f.rp}/5</td>
              <td style={{fontSize:'.7rem',color:'var(--txt2)'}}>{i===0?'Priorité 1':i===1?'Priorité 2':i===2?'Alternatif':'Conditionnel'}</td>
            </tr>
          );})}</tbody>
        </table>
      </div>
      <div className="rpt-section">
        <h3>💡 Recommandations Stratégiques</h3>
        {[
          {n:'Contrats long terme ADNOC + Yara',d:'Contrats 3 ans. Capacité combinée 2,17 MT/an. Économie cible –8%.'},
          {n:'Diversification fournisseurs',d:'Min. 3 fournisseurs par matière critique. Concentration max 40%. CF Industries en backup.'},
          {n:'EOQ + ajustement Monte Carlo P95',d:'Q* Wilson pour toutes matières. Ajuster P95 (+12%) pour NH3/Fuel. Réduction stockage ~15%.'},

          {n:'Mitigation risques critiques',d:'Afriquia: limite 10% volumes. Aramco: SLA pénalités (fiab. 85.5%). Stock tampon 30j.'},
        ].map((r,i)=><div key={i} className="rec-item"><div className="rec-num">{i+1}</div><div className="rec-text"><strong>{r.n}:</strong> {r.d}</div></div>)}
      </div>
      <div className="rpt-section">
        <h3>📅 Roadmap 2025</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {[
            {q:'T1 2025',col:'var(--P)',items:['Déploiement EOQ','Contrat ADNOC','ML prod.']},

          ].map(({q,col,items})=>(
            <div key={q} style={{background:'var(--bg3)',border:`1px solid ${col}44`,borderRadius:'var(--r2)',padding:10}}>
              <div style={{color:col,fontWeight:700,fontSize:'.75rem',marginBottom:7,borderBottom:`1px solid ${col}33`,paddingBottom:4}}>{q}</div>
              {items.map((item,j)=><div key={j} style={{fontSize:'.7rem',color:'var(--txt2)',padding:'3px 0',borderBottom:'1px solid #21262d'}}><span style={{color:col,marginRight:3}}>›</span>{item}</div>)}
            </div>
          ))}
        </div>
      </div>
      <div style={{textAlign:'center',padding:'12px 0',color:'var(--txt2)',fontSize:'.68rem',borderTop:'var(--bdr)'}}>
        OCP Group · Procurement Intelligence Platform · {new Date().toLocaleDateString('fr-FR',{year:'numeric',month:'long',day:'numeric'})} · Confidentiel
      </div>
    </>
  );
}

/* ════════ APP ════════ */

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
